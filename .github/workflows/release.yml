name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 取完整历史与 tag 对象，注释内容做 release 正文
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go vet ./... && go test ./...
      - name: tag annotation as release body
        run: git tag -l --format='%(contents)' "$GITHUB_REF_NAME" > TAG_NOTES.md && cat TAG_NOTES.md
      - name: cross build
        run: |
          mkdir -p dist
          for target in windows/amd64 linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS=${target%/*}; GOARCH=${target#*/}
            ext=""; [ "$GOOS" = "windows" ] && ext=".exe"
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "dist/ccpill-$GOOS-$GOARCH$ext" .
          done
          ls -la dist/
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: TAG_NOTES.md
          generate_release_notes: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: prepare npm packages
        run: node npm/scripts/prepare-packages.js "${GITHUB_REF_NAME#v}"
      - name: publish platform packages
        run: |
          for d in npm-publish/platforms/*; do
            (cd "$d" && npm publish --access public)
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: wait for registry propagation
        run: sleep 30 # 平台包→主包发布顺序 + 30s 等 CDN，缺一会让安装窗口期解析失败（社区踩坑值）
      - name: publish main package
        run: cd npm-publish/main && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
